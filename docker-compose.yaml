services:
  de_postgres:
    image: postgres:11
    container_name: de_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - de_network
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 10s
      timeout: 8s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio
    env_file:
      - .env
    command: [ "server", "/data","--address",":9000", "--console-address", ":9001" ]
    networks:
      - de_network
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mc:
    image: minio/mc
    container_name: mc
    hostname: mc
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
        until (/usr/bin/mc alias set minio http://minio:9000 admin admin123) do
          echo '...waiting for minio...'
          sleep 1
        done;
        /usr/bin/mc mb -p minio/warehouse;
        /usr/bin/mc policy set public minio/warehouse;
        exit 0;
      "
    depends_on:
      - minio
    networks:
      - de_network

